<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen"/>
  <title>Selamat Hari Raya Idul Fitri</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ─── VIDEO ─── */
    #mainVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 1;
    }

    /* ─── SPLASH FULLSCREEN ─── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      cursor: pointer;
      transition: opacity 0.4s ease;
    }
    #splash.gone {
      opacity: 0;
      pointer-events: none;
    }

    /* Icon speaker besar */
    .icon-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: beat 1.6s ease-in-out infinite;
    }
    .icon-wrap svg {
      width: 46px;
      height: 46px;
      fill: #fff;
    }
    @keyframes beat {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0   rgba(255,255,255,0.5); }
      50%       { transform: scale(1.06); box-shadow: 0 0 0 18px rgba(255,255,255,0); }
    }

    .txt-main {
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }
    .txt-sub {
      color: rgba(255,255,255,0.65);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <video
    id="mainVideo"
    src="video.mp4"
    loop muted playsinline
    webkit-playsinline
    x5-playsinline
    x5-video-player-type="h5"
    preload="auto"
  ></video>

  <!-- Splash: sentuh di mana saja → suara langsung nyala -->
  <div id="splash">
    <div class="icon-wrap">
      <!-- Speaker / volume icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73
                 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11
                 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    </div>
    <div class="txt-main">Sentuh Layar untuk Mulai</div>
    <div class="txt-sub">Video akan diputar dengan suara</div>
  </div>

  <script>
    const video  = document.getElementById('mainVideo');
    const splash = document.getElementById('splash');
    let ready = false;

    // Mulai load & putar muted di background supaya siap
    video.load();
    video.play().catch(() => {});

    function fixSize() {
      video.style.width  = window.innerWidth  + 'px';
      video.style.height = window.innerHeight + 'px';
    }
    fixSize();
    window.addEventListener('resize', fixSize);
    window.addEventListener('orientationchange', () => setTimeout(fixSize, 250));

    // ─── FUNGSI UTAMA: aktifkan suara saat disentuh ───
    function activate(e) {
      if (ready) return;
      ready = true;

      // Cegah event berganda
      e.preventDefault();
      e.stopPropagation();

      // 1. Fullscreen
      try {
        const fs = document.documentElement;
        if (fs.requestFullscreen)            fs.requestFullscreen({ navigationUI: 'hide' });
        else if (fs.webkitRequestFullscreen) fs.webkitRequestFullscreen();
        else if (fs.mozRequestFullScreen)    fs.mozRequestFullScreen();
      } catch (_) {}

      // 2. Buka suara — WAJIB di dalam gesture user agar browser izinkan
      video.pause();
      video.muted       = false;
      video.volume      = 1.0;
      video.currentTime = 0;

      const p = video.play();
      if (p && p.then) {
        p.then(() => {
          splash.classList.add('gone');
          setTimeout(() => { if (splash.parentNode) splash.remove(); }, 500);
        }).catch(() => {
          // Jika masih diblokir browser, tetap sembunyikan splash
          video.muted = true;
          video.play().catch(() => {});
          splash.classList.add('gone');
        });
      } else {
        splash.classList.add('gone');
      }
    }

    splash.addEventListener('touchstart', activate, { passive: false });
    splash.addEventListener('click',      activate);

    // Jaga video tetap jalan
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && ready) video.play().catch(() => {});
    });
    video.addEventListener('pause', () => {
      if (!document.hidden && ready) setTimeout(() => video.play().catch(() => {}), 80);
    });
  </script>
</body>
</html>
