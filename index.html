<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen"/>
  <title>Selamat Hari Raya Idul Fitri</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html {
      width: 100%;
      height: 100%;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ═══ VIDEO ═══ */
    #mainVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 1;
    }

    /* ═══ SPLASH / TAP TO START ═══ */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      cursor: pointer;
      transition: opacity 0.6s ease;
    }
    #splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .tap-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2.5px solid rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ripple 1.8s ease-in-out infinite;
    }
    .tap-circle svg {
      width: 38px;
      height: 38px;
      fill: white;
    }
    @keyframes ripple {
      0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
      70%  { box-shadow: 0 0 0 22px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    .tap-label {
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-align: center;
      opacity: 0.9;
    }
    .tap-sub {
      color: rgba(255,255,255,0.55);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- VIDEO -->
  <video
    id="mainVideo"
    src="video.mp4"
    loop
    muted
    playsinline
    webkit-playsinline
    x5-playsinline
    x5-video-player-type="h5"
    x5-video-player-fullscreen="false"
    preload="auto"
  ></video>

  <!-- SPLASH SCREEN - tap to start dengan suara -->
  <div id="splash" ontouchstart="startVideo()" onclick="startVideo()">
    <div class="tap-circle">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    </div>
    <div class="tap-label">Ketuk untuk Mulai</div>
    <div class="tap-sub">Video + Suara akan diputar</div>
  </div>

  <script>
    const video  = document.getElementById('mainVideo');
    const splash = document.getElementById('splash');
    let started  = false;

    // Preload video di background (muted dulu)
    video.load();
    video.play().catch(() => {});

    function startVideo() {
      if (started) return;
      started = true;

      // Fullscreen
      const el = document.documentElement;
      if (el.requestFullscreen)            el.requestFullscreen({ navigationUI: 'hide' }).catch(() => {});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();

      // Unmute & putar dengan suara — HARUS dalam gesture user
      video.muted  = false;
      video.volume = 1;
      video.currentTime = 0;
      video.play().then(() => {
        splash.classList.add('hide');
        setTimeout(() => splash.remove(), 700);
      }).catch(() => {
        // Fallback: tetap muted tapi tetap sembunyikan splash
        video.muted = true;
        video.play();
        splash.classList.add('hide');
        setTimeout(() => splash.remove(), 700);
      });
    }

    // Jaga video tetap jalan
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && started) video.play().catch(() => {});
    });
    video.addEventListener('pause', () => {
      if (!document.hidden && started) setTimeout(() => video.play().catch(() => {}), 80);
    });

    // Fix ukuran saat orientasi berubah
    function fixVideoSize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      video.style.width  = w + 'px';
      video.style.height = h + 'px';
    }
    window.addEventListener('resize', fixVideoSize);
    window.addEventListener('orientationchange', () => setTimeout(fixVideoSize, 300));
    fixVideoSize();
  </script>
</body>
</html>
