<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <title>Selamat Hari Raya Idul Fitri</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    #video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 1;
    }

    #mainVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;
    }

    /* Tap to Unmute overlay */
    #unmute-overlay {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 15px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.2);
      animation: pulse 2s infinite;
      transition: opacity 0.5s;
    }

    #unmute-overlay svg {
      width: 20px;
      height: 20px;
    }

    #unmute-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
      50% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
    }

    /* Fullscreen button */
    #fullscreen-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    #fullscreen-btn:hover { opacity: 1; }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      transition: opacity 0.8s;
    }
    #loading.fade {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
    <span style="font-size:14px;opacity:0.7;">Memuat video...</span>
  </div>

  <!-- Video Container -->
  <div id="video-container">
    <video
      id="mainVideo"
      src="Biru_dan_Kuning_Modern_Meriah_Ucapan_Hari_Raya_Idul_Fitri_Keluarga_Video_Seluler.mp4"
      autoplay
      loop
      muted
      playsinline
      webkit-playsinline
      preload="auto"
    ></video>
  </div>

  <!-- Tap to Unmute -->
  <div id="unmute-overlay" onclick="unmuteVideo()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/>
      <line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
    Ketuk untuk suara
  </div>

  <!-- Fullscreen Button -->
  <button id="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 3 21 3 21 9"/>
      <polyline points="9 21 3 21 3 15"/>
      <line x1="21" y1="3" x2="14" y2="10"/>
      <line x1="3" y1="21" x2="10" y2="14"/>
    </svg>
  </button>

  <script>
    const video = document.getElementById('mainVideo');
    const loading = document.getElementById('loading');
    const unmuteOverlay = document.getElementById('unmute-overlay');

    // Hide loading when video can play
    video.addEventListener('canplay', () => {
      setTimeout(() => loading.classList.add('fade'), 300);
      setTimeout(() => loading.remove(), 1100);
    });

    // Fallback: hide loading after 3s
    setTimeout(() => {
      loading.classList.add('fade');
      setTimeout(() => loading.remove(), 1100);
    }, 3000);

    // Auto-play with sound attempt, fallback to muted
    function tryPlay() {
      video.muted = false;
      video.play().then(() => {
        unmuteOverlay.classList.add('hidden');
      }).catch(() => {
        // Browser blocked unmuted autoplay — play muted
        video.muted = true;
        video.play();
        unmuteOverlay.classList.remove('hidden');
      });
    }

    // Try unmuted first
    window.addEventListener('load', () => {
      setTimeout(tryPlay, 100);
    });

    // Unmute on tap
    function unmuteVideo() {
      video.muted = false;
      video.volume = 1;
      unmuteOverlay.classList.add('hidden');
    }

    // Auto fullscreen on load (works on some browsers/Android)
    function requestFullscreen(el) {
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // iOS: use video native fullscreen
    function iosFullscreen() {
      if (video.webkitEnterFullscreen) {
        video.webkitEnterFullscreen();
      }
    }

    // Toggle fullscreen on button click
    function toggleFullscreen() {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        requestFullscreen(document.documentElement);
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      }
    }

    // Auto-request fullscreen on first interaction (required by most browsers)
    let fullscreenRequested = false;
    document.addEventListener('click', () => {
      if (!fullscreenRequested) {
        fullscreenRequested = true;
        requestFullscreen(document.documentElement);
        unmuteVideo();
      }
    }, { once: false });

    document.addEventListener('touchstart', () => {
      if (!fullscreenRequested) {
        fullscreenRequested = true;
        requestFullscreen(document.documentElement);
        unmuteVideo();
      }
    }, { once: false });

    // Keep video looping and handle visibility change (tab switch)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        video.play();
      }
    });

    // Ensure video never stops
    video.addEventListener('ended', () => video.play());
    video.addEventListener('pause', () => {
      // Only auto-resume if page is visible
      if (!document.hidden) {
        setTimeout(() => video.play(), 100);
      }
    });
  </script>
</body>
</html>
